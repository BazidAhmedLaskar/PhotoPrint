<head>

  <meta name="description" content="Free online image resizer. Resize multiple images, choose output format (JPG, PNG, WebP), and batch download instantly. Perfect for social media, web, and print.">
  <meta name="keywords" content="image resizer, batch resize, photo resizer, resize PNG, resize JPG, WebP converter, online tool">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="1024x1024.png" type="image/png">
  <link rel="shortcut icon" href="1024x1024.png" type="image/png">
  <link rel="apple-touch-icon" href="1024x1024.png">
  
  <style>
    .breadcrumb {
      padding: 10px 20px;
      position: fixed;
      top: 70px;
      left: 0;
      right: 0;
      background: rgba(13, 21, 38, 0.95);
      border-bottom: 1px solid rgba(43,115,255,0.3);
      font-size: 0.875rem;
      color: #9BA4B8;
      font-weight: 500;
      text-align: center;
      width: 100%;
      box-sizing: border-box;
      z-index: 99;
      opacity: 1;
      transition: opacity 0.3s ease;
      height: 44px;
    }
    
    .breadcrumb.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    body.breadcrumb-visible {
      margin-top: 44px;
      transition: margin-top 0.3s ease;
    }
    
    body:not(.breadcrumb-visible) {
      margin-top: 0;
      transition: margin-top 0.3s ease;
    }

    .images-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    .image-slot{aspect-ratio:1;border:2px dashed var(--border);border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--surface);transition:.2s;position:relative;overflow:hidden}
    .image-slot:hover{border-color:var(--blue);background:rgba(43,115,255,.05)}
    .image-slot img{width:100%;height:100%;object-fit:cover;border-radius:calc(var(--r) - 2px)}
    .image-slot-remove{position:absolute;top:-8px;right:-8px;width:24px;height:24px;background:var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.8rem;cursor:pointer;opacity:.7;transition:.2s;z-index:10}
    .image-slot:hover .image-slot-remove{opacity:1;transform:scale(1.1)}
    .preset-buttons{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:6px}
    .preset-btn{padding:6px 8px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:.7rem;font-weight:500;cursor:pointer;transition:.2s}
    .preset-btn:hover{background:var(--border);color:var(--text)}
    .preset-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
    .resize-preview{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);display:flex;align-items:center;justify-content:center;margin:12px 0;overflow:hidden;min-height:300px}
    .resize-preview img{max-width:100%;max-height:100%;object-fit:contain}
    .resize-info{background:rgba(43,115,255,.05);padding:12px;border-radius:var(--r);border:1px solid rgba(43,115,255,.2);font-size:.8rem;color:var(--text)}
  </style>
</head>
<body>

<!-- ═══════════════ NAV ═══════════════ -->
<nav>
  <div class="nav-logo" onclick="window.location.href='index.html'" style="cursor:pointer">
    <img src="1024x1024.png" alt="PhotoPrint Wala Logo" />
    Photo<span>Print</span> Wala
  </div>
  <button id="navMenuToggle" class="nav-menu-toggle" onclick="toggleNavMenu()">☰</button>
  <div class="nav-links" id="navLinks">
    <a href="index.html" class="nav-link" data-page="home">Home</a>
    <a href="tools.html" class="nav-link nav-link-hide" data-page="tools">Tools</a>
    <a href="updates.html" class="nav-link nav-link-hide" data-page="updates">Updates</a>
    <a href="download.html" class="nav-link nav-link-hide" data-page="download">Download</a>
    <a href="contact.html" class="nav-link nav-link-hide" data-page="contact">Contact</a>
  </div>
</nav>

<div class="breadcrumb">Tools > Image Resizer</div>

<div id="page-tool">

  <div class="tool-layout">
    <!-- LEFT PANEL -->
    <div class="tool-panel">

      <!-- STEP 1: ADD IMAGES -->
      <div class="panel-section">
        <div class="panel-label">📸 Step 1: Add Images</div>
        <button class="btn btn-primary" style="width:100%;margin-bottom:8px" onclick="document.getElementById('imageInput').click()">➕ Add Images</button>
        <input type="file" id="imageInput" accept="image/*" multiple style="display:none" onchange="handleImageUpload(event)">
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;border:1px solid var(--border);border-radius:var(--r);padding:12px;max-height:250px;overflow-y:auto" id="imagesList"></div>
        <div id="imageCount" style="font-size:.75rem;color:var(--muted);margin-top:8px">0 images added</div>
      </div>

      <!-- STEP 2: RESIZE OPTIONS -->
      <div class="panel-section">
        <div class="panel-label">📐 Step 2: Resize</div>
        
        <!-- Preset Sizes -->
        <div style="margin-bottom:12px">
          <div style="font-size:.85rem;color:var(--muted);margin-bottom:6px">Popular Sizes</div>
          <div class="preset-buttons">
            <button class="preset-btn" onclick="applyPreset('instagram')">Instagram</button>
            <button class="preset-btn" onclick="applyPreset('facebook')">Facebook</button>
            <button class="preset-btn" onclick="applyPreset('twitter')">Twitter</button>
            <button class="preset-btn" onclick="applyPreset('linkedin')">LinkedIn</button>
            <button class="preset-btn" onclick="applyPreset('thumbnail')">Thumbnail</button>
            <button class="preset-btn" onclick="applyPreset('web')">Web</button>
            <button class="preset-btn" onclick="applyPreset('hd')">HD</button>
            <button class="preset-btn" onclick="applyPreset('mobile')">Mobile</button>
          </div>
        </div>

        <!-- Custom Dimensions -->
        <div style="margin-bottom:12px;padding:12px;background:rgba(43,115,255,.05);border-radius:var(--r);border:1px solid rgba(43,115,255,.2)">
          <div style="font-size:.85rem;color:var(--muted);margin-bottom:8px">Custom Size</div>
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
            <input type="number" id="customWidth" min="1" max="5000" value="800" class="form-input" style="flex:1;font-size:.8rem" placeholder="Width">
            <span style="color:var(--muted)">×</span>
            <input type="number" id="customHeight" min="1" max="5000" value="600" class="form-input" style="flex:1;font-size:.8rem" placeholder="Height">
          </div>
          <label style="display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--muted)">
            <input type="checkbox" id="maintainRatio" checked>
            Keep aspect ratio
          </label>
        </div>

        <!-- Output Format -->
        <div style="margin-bottom:12px;padding:12px;background:rgba(255,152,0,.05);border-radius:var(--r);border:1px solid rgba(255,152,0,.2)">
          <div style="font-size:.85rem;color:var(--muted);margin-bottom:8px">📤 Format & Quality</div>
          <div style="display:flex;gap:12px;margin-bottom:8px">
            <label style="display:flex;align-items:center;gap:4px;font-size:.8rem">
              <input type="radio" name="format" value="image/jpeg" checked>
              JPG
            </label>
            <label style="display:flex;align-items:center;gap:4px;font-size:.8rem">
              <input type="radio" name="format" value="image/png">
              PNG
            </label>
            <label style="display:flex;align-items:center;gap:4px;font-size:.8rem">
              <input type="radio" name="format" value="image/webp">
              WebP
            </label>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:.8rem;color:var(--muted)">Quality:</span>
            <input type="range" id="quality" min="0.3" max="1" step="0.1" value="0.9" style="flex:1">
            <span id="qualityLabel" style="font-size:.8rem;color:var(--text);min-width:35px">90%</span>
          </div>
        </div>
      </div>

      <!-- STEP 3: DOWNLOAD -->
      <div class="panel-section">
        <div class="panel-label">⬇️ Step 3: Download</div>
        <button class="btn btn-green btn-lg" style="width:100%;margin-bottom:8px" onclick="resizeAndDownloadAll()">🎯 Download All</button>
        <div id="imageCount" style="font-size:.75rem;color:var(--muted);margin-top:8px;text-align:center">0 images</div>
      </div>

    </div>

    <!-- CENTER PANEL - PREVIEW -->
    <div class="tool-center">
      <div style="padding:20px">
        <div style="font-size:.9rem;color:var(--muted);margin-bottom:12px">📊 Preview</div>
        <div class="resize-preview">
          <div id="previewPlaceholder" style="text-align:center;color:var(--muted)">
            <span style="font-size:2rem;display:block;margin-bottom:12px">🖼️</span>
            <p style="font-size:.85rem">Select image to see preview</p>
          </div>
          <img id="previewImage" style="display:none" alt="Preview">
        </div>
      </div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
let images=[],selectedId=null;const PRESETS={instagram:{w:1080,h:1080},facebook:{w:1200,h:628},twitter:{w:1024,h:512},linkedin:{w:1200,h:627},thumbnail:{w:320,h:240},web:{w:800,h:600},hd:{w:1920,h:1080},mobile:{w:540,h:960}};
function handleImageUpload(e){for(let file of e.target.files){if(!file.type.startsWith('image/'))continue;const r=new FileReader();r.onload=evt=>{const img=new Image();img.onload=()=>{const id=Date.now()+Math.random();images.push({id,name:file.name,src:evt.target.result,w:img.width,h:img.height});renderList()};img.src=evt.target.result};r.readAsDataURL(file)}e.target.value=''}
function renderList(){const l=document.getElementById('imagesList');l.innerHTML=images.map(img=>`<div class="image-slot" onclick="selectImage('${img.id}')"><img src="${img.src}"><div class="image-slot-remove" onclick="event.stopPropagation();removeImage('${img.id}')">✕</div></div>`).join('');document.getElementById('imageCount').textContent=`${images.length} image${images.length!==1?'s':''}`}
function removeImage(id){images=images.filter(img=>img.id!=id);if(selectedId==id){selectedId=null;clearPreview()}renderList()}
function selectImage(id){selectedId=id;updatePreview()}
function updatePreview(){if(!selectedId){clearPreview();return}const img=images.find(i=>i.id==selectedId);if(!img)return;const w=parseInt(document.getElementById('customWidth').value);const h=parseInt(document.getElementById('customHeight').value);const fmt=document.querySelector('input[name="format"]:checked').value;const qual=document.getElementById('quality').value;document.getElementById('previewImage').src=img.src;document.getElementById('previewImage').style.display='block';document.getElementById('previewPlaceholder').style.display='none';document.getElementById('resizeInfo').style.display='grid';document.getElementById('originalSize').textContent=`${img.w}×${img.h}`;document.getElementById('newSize').textContent=`${w}×${h}`;document.getElementById('formatLabel').textContent=fmt==='image/jpeg'?'JPG':fmt==='image/png'?'PNG':'WebP';document.getElementById('qualityInfo').textContent=Math.round(qual*100)+'%'}
function clearPreview(){document.getElementById('previewImage').style.display='none';document.getElementById('previewPlaceholder').style.display='block';document.getElementById('resizeInfo').style.display='none'}
function applyPreset(key){const p=PRESETS[key];document.getElementById('customWidth').value=p.w;document.getElementById('customHeight').value=p.h;document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');updatePreview()}
document.getElementById('quality').oninput=()=>{document.getElementById('qualityLabel').textContent=Math.round(document.getElementById('quality').value*100)+'%';updatePreview()};
function resizeAndDownloadAll(){if(!images.length){alert('Add images first');return}const w=parseInt(document.getElementById('customWidth').value);const h=parseInt(document.getElementById('customHeight').value);const fmt=document.querySelector('input[name="format"]:checked').value;const qual=parseFloat(document.getElementById('quality').value);images.forEach((img,i)=>{setTimeout(()=>{const c=document.createElement('canvas');const ctx=c.getContext('2d');const bi=new Image();bi.onload=()=>{c.width=w;c.height=h;ctx.drawImage(bi,0,0,w,h);c.toBlob(blob=>{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;const ext=fmt==='image/jpeg'?'jpg':fmt==='image/png'?'png':'webp';a.download=`${img.name.split('.')[0]}_${w}x${h}.${ext}`;a.click();URL.revokeObjectURL(url)},fmt,qual)};bi.src=img.src},i*300)})}
document.addEventListener('DOMContentLoaded',()=>{const bc=document.querySelector('.breadcrumb');if(bc){document.body.classList.add('breadcrumb-visible');setTimeout(()=>{bc.classList.add('hidden');document.body.classList.remove('breadcrumb-visible')},5000)}});
</script>

</body>
</html>
